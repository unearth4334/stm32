name: build-blinky

on:
  push:
    branches:
      - main
      - explore/**
      - feature/**
  pull_request:
  workflow_dispatch:
    inputs:
      board:
        description: 'Target board'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - stm32f4
          - stm32l0

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        board: [stm32f4, stm32l0]
        include:
          - board: stm32f4
            cmake_options: ""
            project_path: "projects/blackpill_f411ce_blinky"
            artifact_name: "firmware-stm32f4"
          - board: stm32l0
            cmake_options: "-DSTM32_USE_L0=ON"
            project_path: "projects/stm32l0_discovery_blinky"
            artifact_name: "firmware-stm32l0"
    
    # Skip stm32l0 builds on non-feature branches unless explicitly requested
    if: |
      github.event_name == 'workflow_dispatch' ||
      matrix.board == 'stm32f4' ||
      (matrix.board == 'stm32l0' && (startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/explore/')))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi

      - name: Populate STM32CubeF4 vendor sources
        if: matrix.board == 'stm32f4'
        run: |
          rm -rf third_party/stm32cubef4
          git clone --depth 1 https://github.com/STMicroelectronics/stm32cubef4 third_party/stm32cubef4
          git -C third_party/stm32cubef4 submodule update --init --depth 1 --recommend-shallow \
            Drivers/CMSIS/Device/ST/STM32F4xx \
            Drivers/STM32F4xx_HAL_Driver \
            Middlewares/Third_Party/FreeRTOS \
            Middlewares/ST/STM32_USB_Device_Library

      - name: Populate STM32CubeL0 vendor sources
        if: matrix.board == 'stm32l0'
        run: |
          rm -rf third_party/stm32cubel0
          git clone --depth 1 https://github.com/STMicroelectronics/stm32cubel0 third_party/stm32cubel0
          git -C third_party/stm32cubel0 submodule update --init --depth 1 --recommend-shallow \
            Drivers/CMSIS/Device/ST/STM32L0xx \
            Drivers/STM32L0xx_HAL_Driver \
            Middlewares/Third_Party/FreeRTOS

      - name: Populate startup files (STM32F4)
        if: matrix.board == 'stm32f4'
        run: |
          STARTUP_SRC=third_party/stm32cubef4/Drivers/CMSIS/Device/ST/STM32F4xx/Source/Templates/gcc/startup_stm32f411xe.s
          SYSTEM_SRC=third_party/stm32cubef4/Drivers/CMSIS/Device/ST/STM32F4xx/Source/Templates/system_stm32f4xx.c

          test -f "$STARTUP_SRC" || { echo "Missing startup source: $STARTUP_SRC"; find third_party/stm32cubef4 -name 'startup_stm32f411xe.s' | head -n 20; exit 1; }
          test -f "$SYSTEM_SRC" || { echo "Missing system source: $SYSTEM_SRC"; find third_party/stm32cubef4 -name 'system_stm32f4xx.c' | head -n 20; exit 1; }

          mkdir -p startup
          cp "$STARTUP_SRC" startup/
          cp "$SYSTEM_SRC" startup/

      - name: Populate startup files (STM32L0)
        if: matrix.board == 'stm32l0'
        run: |
          STARTUP_SRC=third_party/stm32cubel0/Drivers/CMSIS/Device/ST/STM32L0xx/Source/Templates/gcc/startup_stm32l052xx.s
          SYSTEM_SRC=third_party/stm32cubel0/Drivers/CMSIS/Device/ST/STM32L0xx/Source/Templates/system_stm32l0xx.c

          test -f "$STARTUP_SRC" || { echo "Missing startup source: $STARTUP_SRC"; find third_party/stm32cubel0 -name 'startup_stm32l*.s' | head -n 20; exit 1; }
          test -f "$SYSTEM_SRC" || { echo "Missing system source: $SYSTEM_SRC"; find third_party/stm32cubel0 -name 'system_stm32l0xx.c' | head -n 20; exit 1; }

          mkdir -p startup
          cp "$STARTUP_SRC" startup/
          cp "$SYSTEM_SRC" startup/

      - name: Configure (${{ matrix.board }})
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DSTM32_USE_FREERTOS=ON \
            ${{ matrix.cmake_options }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build firmware target
        run: cmake --build build --target firmware --parallel

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/${{ matrix.project_path }}/firmware.elf
            build/${{ matrix.project_path }}/firmware.bin
            build/${{ matrix.project_path }}/firmware.hex
            build/${{ matrix.project_path }}/firmware.map
          if-no-files-found: warn
